<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
      integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.3/leaflet.css"
    />
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.3/leaflet.js"
    ></script>
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/controller.js" type="module"></script>
    <title>Weather Forecast App</title>
  </head>
  <body>
    <div class="container">
      <h2 class="title">Weather Forecast App</h2>
      <div class="row-container">
        <div class="block-container">
          <form class="search" id="search">
            <input class="search__field" type="text" />
            <button>Search</button>
          </form>
        </div>
      </div>
      <div class="row-container main">
        <div class="block-container">
          <div class="content">
            <div class="content__today"></div>
            <div class="content__hourly"></div>
          </div>
        </div>
        <div class="block-container map-container"></div>
      </div>
      <div class="row-container">
        <div class="block-container">
          <h3 class="weekdays-title">Weather forecast for 7 days</h3>
        </div>
      </div>
      <div class="row-container secondary">
        <div class="block-container">
          <div class="week__content"></div>
        </div>
      </div>
    </div>
  </body>
</html>
